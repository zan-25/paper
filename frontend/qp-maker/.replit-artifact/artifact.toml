kind = "web"
previewPath = "/"
title = "AI Question Paper Maker"
version = "1.0.0"
id = "artifacts/qp-maker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20078

[services.development]
run = "pnpm --filter @workspace/qp-maker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qp-maker", "run", "build" ]
publicDir = "artifacts/qp-maker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20078"
BASE_PATH = "/"
